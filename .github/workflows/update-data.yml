# ─────────────────────────────────────────────────────────────────
# UNDER FIRE — Auto-update GitHub Action
# ─────────────────────────────────────────────────────────────────
# Runs every 10 minutes. Polls OREF for new Tzeva Adom alerts.
# Appends to data/alerts.json. Commits if anything new.
# GitHub Pages picks up the commit and auto-deploys the site.
# ─────────────────────────────────────────────────────────────────
name: Update Alert Data

on:
  schedule:
    # Every 10 minutes, 24/7
    - cron: "*/10 * * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab
    inputs:
      backfill_days:
        description: "Days of history to backfill (leave 0 for normal run)"
        required: false
        default: "0"

permissions:
  contents: write   # needed to commit data back to repo

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # safety: kill if it hangs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scripts/oref_scraper.py

      - name: Backfill historical data (if requested)
        if: github.event.inputs.backfill_days != '0' && github.event.inputs.backfill_days != ''
        run: |
          python scripts/backfill.py --days ${{ github.event.inputs.backfill_days }}

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: auto-update alerts [${{ github.run_id }}]"
          file_pattern: "data/*.json data/*.log"
          commit_user_name: "under-fire-bot"
          commit_user_email: "bot@under-fire-project.com"
          skip_dirty_check: false   # only commits if files actually changed
